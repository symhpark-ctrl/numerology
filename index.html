<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생 경로수 수비학 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; }
        input { width: 80%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { width: 85%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        #result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; background: #f9f9f9; line-height: 1.6; }
        .num-circle { display: inline-block; width: 40px; height: 40px; background: #2ecc71; color: white; border-radius: 50%; line-height: 40px; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        .blog-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #03cf5d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 나의 생애 경로수 찾기</h1>
        <p>생년월일을 입력해 보세요 (예: 19950524)</p>
        <input type="number" id="birthdate" placeholder="8자리 숫자 입력">
        <button onclick="calculateNumerology()">결과 확인하기</button>
        
        <div id="result">
            <div id="numDisplay" class="num-circle"></div>
            <div id="readingText" style="text-align: left; font-size: 0.9rem; color: #444;"></div>
            <hr>
            <p style="font-size: 0.8rem; color: #666;">상세 리딩은 블로그에서 확인하세요!</p>
            <a href="https://blog.naver.com/symhp1130" class="blog-btn">블로그에서 상세 리딩 보기</a>
        </div>
    </div>

    <script>
        const readings = {
            1: "<b>1. 시작 (Initiation)</b><br>독립, 리더십, '내 길은 내가 만든다'는 에너지.",
            2: "<b>2. 연결 (Connection)</b><br>관계와 협력, 조화와 배려가 인생의 테마.",
            3: "<b>3. 창조 (Creation)</b><br>창의성과 소통, 낙천성. 표현과 즐거움이 삶의 핵심.",
            4: "<b>4. 건설 (Foundation)</b><br>실용성과 안정, 성실함. 기반을 다지는 책임감."
        };

        function calculateNumerology() {
            const birth = document.getElementById('birthdate').value;
            if (birth.length !== 8) { alert('생년월일 8자리를 입력해주세요.'); return; }
            
            let sum = birth.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
            while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
                sum = sum.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
            }
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('numDisplay').innerText = sum;
            document.getElementById('readingText').innerHTML = readings[sum] || "마스터 넘버 또는 다른 숫자의 상세 리딩은 블로그에서 확인하세요!";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수비학 계산기 — 나의 생애 경로 수 & 2025 개인 연도 수</title>
  <meta name="description" content="생년월일로 알아보는 수비학 리딩. 타고난 기질(생애 경로 수)과 2025년 에너지 흐름(개인 연도 수)을 무료로 계산해보세요." />
  <meta property="og:title" content="수비학 계산기 — 나의 운명의 숫자는?" />
  <meta property="og:description" content="생년월일 하나로 타고난 기질과 2025년의 에너지 방향을 알아보세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50: #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-400: #7F77DD;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --teal-50: #E1F5EE;
      --teal-400: #1D9E75;
      --teal-600: #0F6E56;
      --amber-50: #FAEEDA;
      --amber-600: #854F0B;
      --gray-50: #F8F7F4;
      --gray-100: #EFEFEA;
      --gray-300: #C8C7BF;
      --gray-500: #888780;
      --gray-800: #2C2C2A;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
      line-height: 1.7;
    }

    /* HERO */
    .hero {
      background: var(--purple-800);
      color: white;
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(127,119,221,0.18);
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(29,158,117,0.15);
    }
    .hero-badge {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.1em;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .hero p {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      max-width: 420px;
      margin: 0 auto;
      position: relative;
    }

    /* MAIN */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--gray-100);
      padding: 1.75rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--purple-600);
      margin-bottom: 1.25rem;
      text-transform: uppercase;
    }

    /* INPUT */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field input, .field select {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: border-color 0.15s;
      appearance: none;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--purple-400);
      background: white;
    }

    /* BUTTON */
    .btn-main {
      width: 100%;
      padding: 15px;
      background: var(--purple-800);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
    }
    .btn-main:hover { background: var(--purple-600); }
    .btn-main:active { transform: scale(0.98); }

    /* RESULT */
    .result-section { display: none; }
    .result-section.show { display: block; }

    .num-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .num-card {
      background: var(--gray-50);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      border: 1px solid var(--gray-100);
    }
    .num-card .label {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .num-card .big {
      font-size: 58px;
      font-weight: 700;
      line-height: 1;
      font-family: 'Noto Serif KR', serif;
    }
    .num-card .name {
      font-size: 13px;
      font-weight: 500;
      margin-top: 8px;
    }
    .lp .big, .lp .name { color: var(--purple-800); }
    .py .big, .py .name { color: var(--teal-600); }

    /* MEANING */
    .meaning-card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--gray-100);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .meaning-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot-lp { width: 8px; height: 8px; border-radius: 50%; background: var(--purple-600); display: inline-block; flex-shrink: 0; }
    .dot-py { width: 8px; height: 8px; border-radius: 50%; background: var(--teal-400); display: inline-block; flex-shrink: 0; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag {
      font-size: 12px;
      background: var(--gray-100);
      color: var(--gray-500);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .master-badge {
      font-size: 10px;
      background: var(--amber-50);
      color: var(--amber-600);
      padding: 3px 9px;
      border-radius: 10px;
      font-weight: 700;
    }
    .insight {
      font-size: 14px;
      color: #555;
      line-height: 1.8;
      border-left: 3px solid var(--purple-200);
      padding-left: 14px;
    }
    .insight.teal { border-left-color: var(--teal-400); }

    /* CTA */
    .cta-card {
      background: var(--purple-800);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      color: white;
      margin-bottom: 1rem;
    }
    .cta-card h3 {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .cta-card p {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 1.25rem;
      line-height: 1.7;
    }
    .cta-link {
      display: inline-block;
      padding: 12px 28px;
      background: white;
      color: var(--purple-800);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .cta-link:hover { opacity: 0.9; }

    /* SHARE TAGS */
    .share-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 1rem;
    }
    .share-tag {
      font-size: 12px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.15s;
    }
    .share-tag:hover { background: rgba(255,255,255,0.2); }

    /* HOW TO */
    .how-to {
      background: var(--teal-50);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(29,158,117,0.15);
    }
    .how-to h4 { font-size: 13px; font-weight: 700; color: var(--teal-600); margin-bottom: 10px; }
    .how-to p { font-size: 13px; color: #2a5a4a; line-height: 1.75; }

    /* FORMULA */
    .formula {
      background: var(--gray-100);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--gray-500);
      margin: 10px 0 0;
      font-family: monospace;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      .input-grid { grid-template-columns: 1fr; }
      .num-grid { grid-template-columns: 1fr 1fr; }
      .hero { padding: 3rem 1rem 2.5rem; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">✦ 무료 수비학 리딩</div>
  <h1>나의 숫자로 읽는<br>2025년 운명의 흐름</h1>
  <p>생년월일 하나로 타고난 기질과<br>올해의 에너지 방향을 알아보세요</p>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">생년월일 입력</div>
    <div class="input-grid">
      <div class="field">
        <label>태어난 연도</label>
        <input type="number" id="year" placeholder="예: 1990" min="1900" max="2010" />
      </div>
      <div class="field">
        <label>태어난 월</label>
        <select id="month">
          <option value="">월</option>
          <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
          <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
          <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <div class="field">
        <label>태어난 일</label>
        <input type="number" id="day" placeholder="예: 17" min="1" max="31" />
      </div>
    </div>
    <button class="btn-main" onclick="calculate()">나의 수비학 수 계산하기 →</button>
  </div>

  <div class="result-section" id="result">

    <div class="num-grid">
      <div class="num-card lp">
        <div class="label">생애 경로 수</div>
        <div class="big" id="lpNum">—</div>
        <div class="name" id="lpName">—</div>
      </div>
      <div class="num-card py">
        <div class="label">2025 개인 연도 수</div>
        <div class="big" id="pyNum">—</div>
        <div class="name" id="pyName">—</div>
      </div>
    </div>

    <div class="meaning-card">
      <h3><span class="dot-lp"></span> 타고난 기질 — 생애 경로 수 <span id="lpNumSmall"></span></h3>
      <div class="tags" id="lpTags"></div>
      <div class="insight" id="lpInsight"></div>
    </div>

    <div class="meaning-card">
      <h3><span class="dot-py"></span> 2025년 에너지 흐름 — 개인 연도 수 <span id="pyNumSmall"></span></h3>
      <div class="tags" id="pyTags"></div>
      <div class="insight teal" id="pyInsight"></div>
    </div>

    <div class="cta-card">
      <a href="https://blog.naver.com/symhp1130" class="cta-link">블로그 구독하러 가기 →</a>
      <div class="share-row">
        <button class="share-tag" onclick="shareResult()">결과 공유하기</button>
        <button class="share-tag" onclick="window.scrollTo({top:0,behavior:'smooth'})">다시 계산하기</button>
      </div>
    </div>

  </div>

  <div class="how-to">
    <h4>계산 방법이 궁금하다면?</h4>
    <p><strong>생애 경로 수</strong>: 생년월일 숫자를 모두 더해 한 자리가 될 때까지 줄이기<br>
    (단, 11 · 22 · 33은 마스터 넘버로 그대로 사용)</p>
    <div class="formula">예)

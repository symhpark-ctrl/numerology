<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수비학 탄생수 계산기 - 나의 인생 설계도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --p-800: #3C3489; --p-600: #534AB7; --p-400: #7F77DD; --bg: #F8F7F4; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: #2c2c2a; line-height: 1.7; padding-bottom: 50px; }
    .hero { background: var(--p-800); color: white; text-align: center; padding: 4rem 1.5rem; }
    .hero h1 { font-family: 'Noto Serif KR', serif; font-size: 2rem; margin-bottom: 10px; }
    .container { max-width: 600px; margin: -30px auto 0; padding: 0 20px; }
    .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; }
    input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; font-size: 16px; transition: 0.3s; }
    input:focus { border-color: var(--p-400); outline: none; }
    .btn-main { width: 100%; padding: 18px; background: var(--p-800); color: white; border: none; border-radius: 15px; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-main:hover { background: var(--p-600); transform: translateY(-2px); }
    .result-section { display: none; animation: fadeIn 0.8s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .res-num { font-size: 60px; font-family: 'Noto Serif KR', serif; color: var(--p-800); font-weight: 700; margin: 10px 0; }
    .res-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; color: #333; }
    .res-desc { background: #f9f8ff; padding: 20px; border-radius: 15px; border-left: 4px solid var(--p-400); font-size: 15px; color: #444; text-align: left; }
    .cta-card { background: var(--p-800); border-radius: 20px; padding: 35px 20px; text-align: center; color: white; margin-top: 30px; }
    .naver-btn { display: inline-block; padding: 15px 30px; background: #03c75a; color: white; border-radius: 50px; text-decoration: none; font-weight: 700; margin-bottom: 20px; transition: 0.3s; }
    .naver-btn:hover { background: #02b350; transform: scale(1.05); }
    .move-btn { display: inline-block; padding: 12px 24px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 12px; text-decoration: none; font-size: 14px; transition: 0.2s; }
    .move-btn:hover { background: rgba(255,255,255,0.25); }
    @media (max-width: 480px) { .input-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="hero"><h1>📝 수비학 탄생수 계산기</h1><p>당신의 생년월일에 숨겨진 인생 설계도를 확인하세요</p></div>
<div class="container">
  <div class="card">
    <div class="input-grid">
      <div class="field"><label>태어난 연도</label><input type="number" id="year" placeholder="1990"></div>
      <div class="field"><label>태어난 월</label><select id="month"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select></div>
      <div class="field"><label>태어난 일</label><input type="number" id="day" placeholder="17"></div>
    </div>
    <button class="btn-main" onclick="calculate()">내 운명의 숫자 확인하기 →</button>
  </div>
  <div id="result" class="result-section">
    <div class="card" style="text-align:center;">
      <div style="font-size:14px; color:#888;">당신의 생애 경로 수</div>
      <div class="res-num" id="resNum"></div>
      <div class="res-title" id="resTitle"></div>
      <div class="res-desc" id="resDesc"></div>
    </div>
    <div class="cta-card">
        <p style="margin-bottom:20px; font-size:16px;">🔮 매일 업데이트되는 운세와 리딩!</p>
        <a href="https://blog.naver.com/symhp1130" target="_blank" class="naver-btn">네이버 블로그 구독하기 💚</a><br>
        <a href="https://symhpark-ctrl.github.io/tarot/" class="move-btn">🔮 타로 성격/영혼카드 계산기로 이동</a>
    </div>
  </div>
</div>
<script>
const info = {
  1: {n:"독립적인 개척자", t:"스스로 길을 만드는 리더의 에너지를 가졌습니다. 자신감이 넘치고 독립적이지만, 때로는 타인의 의견을 경청하는 유연함이 필요합니다."},
  2: {n:"조화로운 중재자", t:"협력과 배려가 당신의 가장 큰 힘입니다. 사람 사이의 갈등을 해결하는 능력이 탁월하며 예민한 직관력을 지녔습니다."},
  3: {n:"창의적인 표현가", t:"예술적 감각과 소통 능력이 뛰어납니다. 즐거움과 긍정의 에너지를 전파하며 창조적인 활동에서 보람을 느낍니다."},
  4: {n:"안정적인 건설가", t:"성실함과 질서를 중요시하는 현실적인 실천가입니다. 탄탄한 기반을 다지고 목표를 완수하는 끈기가 대단합니다."},
  5: {n:"자유로운 모험가", t:"변화와 자유를 갈망하는 역동적인 영혼입니다. 새로운 경험을 두려워하지 않으며 빠른 적응력과 다재다능함을 가졌습니다."},
  6: {n:"책임감 있는 양육자", t:"사랑과 봉사를 실천하는 따뜻한 마음의 소유자입니다. 가족과 공동체를 돌보는 일에서 인생의 큰 의미를 찾습니다."},
  7: {n:"지혜로운 탐구자", t:"내면의 진리와 지식을 탐구하는 분석가입니다. 고독을 즐기며 깊은 성찰을 통해 삶의 본질을 꿰뚫는 통찰력이 있습니다."},
  8: {n:"강력한 성취자", t:"권위와 성공, 물질적 성취에 능력이 탁월합니다. 큰 조직을 운영하거나 비즈니스적인 감각이 매우 뛰어납니다."},
  9: {n:"인류애를 품은 완성자", t:"세상을 품는 넓은 마음을 가진 인도주의자입니다. 자신의 경험과 지혜를 타인에게 나누고 봉사하는 숙명을 가졌습니다."},
  11: {n:"직관적인 비전가", t:"강력한 영적 에너지와 직관력을 지닌 마스터 넘버입니다. 세상을 밝히는 영감의 등불 같은 역할을 수행합니다."},
  22: {n:"현실의 마스터 빌더", t:"거대한 꿈을 현실로 만드는 능력이 있는 마스터 넘버입니다. 인류를 위한 대형 프로젝트를 실현할 잠재력이 있습니다."},
  33: {n:"치유의 마스터 교사", t:"조건 없는 사랑과 자비로 타인을 치유하는 마스터 넘버입니다. 영적인 스승으로서 타인의 성장을 돕습니다."}
};
function getSum(n) { return String(n).split('').reduce((a,b)=>a+Number(b),0); }
function reduce(n,m) { while(n>9){ if(m&&(n==11||n==22||n==33))break; n=getSum(n); } return n; }
function calculate() {
  const y=document.getElementById('year').value, m=document.getElementById('month').value, d=document.getElementById('day').value;
  if(!y||!m||!d) return alert("생년월일을 모두 입력해주세요.");
  const lp=reduce(getSum(y)+getSum(m)+getSum(d), true);
  document.getElementById('resNum').innerText = lp;
  document.getElementById('resTitle').innerText = "「" + info[lp].n + "」";
  document.getElementById('resDesc').innerText = info[lp].t;
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: document.getElementById('result').offsetTop - 30, behavior: 'smooth' });
}
</script>
</body>
</html>

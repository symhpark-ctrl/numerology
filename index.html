<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수비학 탄생수 계산기 - 나의 인생 설계도</title>
  <meta name="description" content="생년월일로 확인하는 무료 수비학 탄생수 계산기.">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple-800: #3C3489; --purple-600: #534AB7; --purple-400: #7F77DD; --gray-50: #F8F7F4; --white: #FFFFFF; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray-50); color: #2c2c2a; min-height: 100vh; line-height: 1.7; }
    .hero { background: var(--purple-800); color: white; text-align: center; padding: 3rem 1.5rem; }
    .container { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem; }
    .card { background: var(--white); border-radius: 16px; padding: 2rem; margin-bottom: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
    .field input, .field select { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #ddd; }
    .btn-main { width: 100%; padding: 16px; background: var(--purple-800); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .result-section { display: none; margin-top: 20px; }
    .show { display: block; }
    .cta-card { background: var(--purple-800); border-radius: 16px; padding: 2rem; text-align: center; color: white; margin-top: 2rem; }
    .naver-btn { display: inline-block; padding: 14px 28px; background: #03c75a; color: white; border-radius: 10px; text-decoration: none; font-weight: 700; margin-bottom: 10px; }
    .move-btn { display: inline-block; padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid white; border-radius: 10px; text-decoration: none; font-size: 13px; margin-top: 10px; }
    @media (max-width: 480px) { .input-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="hero"><h1>나의 숫자로 읽는 운명</h1><p>생년월일로 기질을 확인하세요</p></div>
<div class="container">
  <div class="card">
    <div class="input-grid">
      <div class="field"><label>연도</label><input type="number" id="year" placeholder="1990"></div>
      <div class="field"><label>월</label><select id="month"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4">4월</option><option value="5">5월</option><option value="6">6월</option><option value="7">7월</option><option value="8">8월</option><option value="9">9월</option><option value="10">10월</option><option value="11">11월</option><option value="12">12월</option></select></div>
      <div class="field"><label>일</label><input type="number" id="day" placeholder="17"></div>
    </div>
    <button class="btn-main" onclick="calculate()">나의 수비학 수 계산하기 →</button>
  </div>
  <div id="result" class="result-section">
    <div class="card"><h3 id="resTitle"></h3><p id="resDesc"></p></div>
    <div class="cta-card">
      <p style="margin-bottom:15px;">더 자세한 리딩은 블로그에서!</p>
      <a href="https://blog.naver.com/symhp1130" target="_blank" class="naver-btn">네이버 블로그 구독하기 💚</a><br>
      <a href="https://symhpark-ctrl.github.io/tarot/" class="move-btn">🔮 타로 성격/영혼카드 계산기로 이동</a>
    </div>
  </div>
</div>
<script>
const info = { 1:{n:"시작",t:"독립과 리더십의 에너지입니다."}, 2:{n:"연결",t:"관계와 협력의 에너지입니다."}, 3:{n:"창조",t:"표현과 즐거움의 에너지입니다."}, 4:{n:"건설",t:"안정과 성실의 에너지입니다."}, 5:{n:"변화",t:"자유와 모험의 에너지입니다."}, 6:{n:"양육",t:"책임과 사랑의 에너지입니다."}, 7:{n:"재평가",t:"지혜와 성찰의 에너지입니다."}, 8:{n:"확장",t:"성취와 영향력의 에너지입니다."}, 9:{n:"완성",t:"인류애와 봉사의 에너지입니다."}, 11:{n:"마스터 11",t:"직관력과 영감을 지닌 비전가입니다."}, 22:{n:"마스터 22",t:"현실의 대형 프로젝트를 실현합니다."}, 33:{n:"마스터 33",t:"무조건적인 사랑을 전하는 교사입니다."} };
function getSum(n) { return String(n).split('').reduce((a,b)=>a+Number(b),0); }
function reduce(n,m) { while(n>9){ if(m&&(n==11||n==22||n==33))break; n=getSum(n); } return n; }
function calculate() {
  const y=document.getElementById('year').value, m=document.getElementById('month').value, d=document.getElementById('day').value;
  if(!y||!m||!d) return alert("입력해주세요.");
  const lp=reduce(getSum(y)+getSum(m)+getSum(d), true);
  document.getElementById('resTitle').innerText = "생애 경로 수 " + lp + " : " + info[lp].n;
  document.getElementById('resDesc').innerText = info[lp].t;
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
